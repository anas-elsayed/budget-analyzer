<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Analyzer</title>

  <link rel="stylesheet" href="css/styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <header>
    <h1>Budget Analyzer</h1>
    <p>Personal Financial Intelligence Dashboard</p>
  </header>

  <main>

    <section class="upload-section">
      <h2>Import Files</h2>

      <label>Contacts TXT Export</label>
      <input type="file" id="contactsFile" />

      <label>Transactions Export</label>
      <input type="file" id="transactionsFile" />

      <button id="importBtn">Import Data</button>
    </section>

    <section class="stats-grid">

      <div class="card">
        <h3>Total Income</h3>
        <p id="totalIncome">0 EGP</p>
      </div>

      <div class="card">
        <h3>Total Expenses</h3>
        <p id="totalExpenses">0 EGP</p>
      </div>

      <div class="card">
        <h3>Tutoring Income</h3>
        <p id="tutoringIncome">0 EGP</p>
      </div>

      <div class="card">
        <h3>Faculty Income</h3>
        <p id="facultyIncome">0 EGP</p>
      </div>

    </section>

    <section class="chart-card">
      <h2>Income Sources</h2>
      <canvas id="incomeChart"></canvas>
    </section>

    <section class="table-card">
      <h2>Transactions</h2>

      <table id="transactionsTable">
        <thead>
          <tr>
            <th>Amount</th>
            <th>Category</th>
            <th>Description</th>
            <th>Confidence</th>
          </tr>
        </thead>

        <tbody></tbody>
      </table>
    </section>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
